# /etc/nginx/sites-available/hl-assets-inventory
#
# โครงสร้าง:
#   Frontend : Next.js (standalone)  → port 3000
#   Backend  : NestJS                → port 3001
#
# ⚠️  Backend ไม่มี global prefix "/api"
#     Nginx จะ strip "/api" ก่อน forward ไป backend
#     เช่น  /api/assets  →  http://127.0.0.1:3001/assets
#
# ก่อน deploy ให้แก้ไข frontend/.env ด้วย:
#   NEXT_PUBLIC_API_URL=http://yourdomain.com/api   (ชี้ผ่าน Nginx)
#   NEXTAUTH_URL=http://yourdomain.com
#
# สั่งรัน:
#   Backend  : pm2 start dist/main.js --name backend  (ใน backend/)
#   Frontend : pm2 start npm --name frontend -- start  (ใน frontend/)

server {
    server_name coredesk.hylifeconnect.com;  # ← แก้เป็น domain จริง

    # Redirect HTTP → HTTPS (เปิดใช้เมื่อมี SSL certificate)
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # ── Next.js static assets (cache นาน) ────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── NestJS static uploads (/uploads/...) ─────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── NextAuth internal handlers (must go to Next.js on port 3000) ────
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── NestJS backend auth login (must go to NestJS on port 3001) ─────
    location = /api/auth/login {
        proxy_pass http://127.0.0.1:3001/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── NestJS backend API — strip /api prefix ────────────────────────
    # /api/assets        → http://127.0.0.1:3001/assets
    # /api/employees     → http://127.0.0.1:3001/employees
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;   # trailing slash = strip /api
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Next.js frontend (ทุก route อื่น) ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/coredesk.hylifeconnect.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/coredesk.hylifeconnect.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

