services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: it-assets-inventory
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d it-assets-inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/it-assets-inventory?schema=public"
      JWT_SECRET: "YOUR_SUPER_SECRET_KEY"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/main"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3000"
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "YOUR_NEXTAUTH_SECRET"
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  pg_data:
